model:
  type: simplicial_transformer
  dim_entity: 64
  num_virtual_entities: 2
  n_heads_1simplicial: 2
  dim_head_1simplicial: 32
  n_heads_2simplicial: 1
  dim_head_2simplicial: 48
  use_layernorm_post_2simplicial: true

training:
  algorithm: "custom_pure_pt"
  lr: 0.0002
  epsilon_rmsprop: 0.1
  gamma: 0.99
  unroll_length: 40
  batch_size: 1280
  entropy_coef: 0.005
  rmsprop_decay: 0.99
  episode_horizon: 0

test_config:
  deterministic_forward: true
  test_seed: 999
