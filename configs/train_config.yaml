# Training configuration for One-Graph MVP of TwoSimplicialAttention
# All hyperparameters and training settings are centralized here.

model:
  in_dim: 32            # input feature dimension per triangle
  out_dim: 64            # output feature dimension per triangle
  num_heads: 4           # number of attention heads
  dropout: 0.0           # dropout rate between Q/K/V and on outputs
  w1: 8                  # sliding window size for K1/V1
  w2: 8                  # sliding window size for K2/V2
  with_residual: true    # apply residual connection and LayerNorm
  use_triton_kernel: false # enable Triton forward kernel (default: disabled)

trainer:
  epochs: 50              # number of training epochs
  batch_size: 1           # MVP uses B=1; extend later for real batching
  learning_rate: 0.001     # base LR
  weight_decay: 0.0       # L2 weight decay
  grad_clip: 1.0          # gradient clipping threshold (None or float)
  device: cpu               # 'cpu' or 'cuda'
  seed: 42                 # random seed for reproducibility

data:
  dataset: synthetic        # dataset type (synthetic for MVP)
  path: data/synthetic/       # path to data (if using real data later)
  n_triangles: 128          # number of triangles in synthetic sequence (example)

logging:
  log_interval: 10           # how often to log metrics during training
  save_checkpoint: true      # save model checkpoints
  checkpoint_dir: checkpoints/  # directory to store checkpoints

notes: |
  This is a minimal, centralized configuration file. Values are provided as defaults
  to be updated by experiments. Extend with additional sections (e.g., data augmentation,
  scheduler) as needed.
